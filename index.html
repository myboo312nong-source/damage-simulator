<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>简易伤害模拟器</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2933;
      --muted: #64748b;
      --line: #d9e1e8;
      --paper: #f8fafc;
      --panel: #ffffff;
      --blue: #2f6fed;
      --red: #dc3a3a;
      --green: #16865f;
      --gold: #b78118;
      --black: #111827;
      --shadow: 0 18px 42px rgba(17, 24, 39, .14);
      --soft-shadow: 0 8px 20px rgba(17, 24, 39, .1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(47, 111, 237, .08) 0 38%, transparent 38% 62%, rgba(220, 58, 58, .08) 62%),
        radial-gradient(circle at 18% 18%, rgba(47, 111, 237, .12), transparent 28%),
        radial-gradient(circle at 82% 35%, rgba(220, 58, 58, .1), transparent 26%),
        linear-gradient(180deg, #edf3f8 0%, #e8eef4 48%, #f5f7f9 100%);
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
    }

    .arena-wrap {
      padding: 24px;
      min-width: 0;
      background:
        linear-gradient(rgba(255, 255, 255, .16) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .14) 1px, transparent 1px);
      background-size: 34px 34px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 36px);
      line-height: 1.1;
      letter-spacing: 0;
      text-shadow: 0 1px 0 rgba(255, 255, 255, .75);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .btn {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff, #f4f7fa);
      color: var(--ink);
      height: 38px;
      padding: 0 12px;
      border-radius: 7px;
      box-shadow: 0 1px 0 rgba(255, 255, 255, .85) inset, 0 1px 3px rgba(17, 24, 39, .06);
      transition: transform .15s ease, border-color .15s ease, background .15s ease, box-shadow .15s ease;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: #a9b8c8;
      box-shadow: 0 1px 0 rgba(255, 255, 255, .9) inset, 0 8px 16px rgba(17, 24, 39, .09);
    }

    .btn:disabled,
    input:disabled {
      cursor: not-allowed;
      opacity: .48;
    }

    .btn.primary {
      background: linear-gradient(180deg, #202b3a, var(--black));
      border-color: var(--black);
      color: white;
    }

    .btn.danger {
      background: #fff4f4;
      border-color: #f0b8b8;
      color: #a62222;
    }

    .battlefield {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      justify-items: center;
    }

    .side {
      width: min(100%, 690px);
      min-width: 0;
      background:
        linear-gradient(90deg, rgba(47, 111, 237, .08), transparent 34%),
        rgba(255, 255, 255, .82);
      border: 1px solid rgba(202, 213, 225, .96);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .side.right {
      background:
        linear-gradient(90deg, rgba(220, 58, 58, .08), transparent 34%),
        rgba(255, 255, 255, .82);
    }

    .side-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .78);
    }

    .side-mark {
      width: 10px;
      height: 24px;
      border-radius: 999px;
      background: var(--blue);
      flex: 0 0 auto;
      box-shadow: 0 0 0 4px rgba(47, 111, 237, .12), 0 0 18px rgba(47, 111, 237, .35);
    }

    .side.right .side-mark {
      background: var(--red);
      box-shadow: 0 0 0 4px rgba(220, 58, 58, .12), 0 0 18px rgba(220, 58, 58, .3);
    }

    .side-title {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }

    .formation {
      padding: 10px 14px;
      display: grid;
      grid-template-columns: 150px max-content;
      gap: 16px;
      align-items: end;
      justify-content: center;
      background: linear-gradient(180deg, rgba(255, 255, 255, .18), rgba(255, 255, 255, .04));
    }

    .row-label {
      margin: 0 0 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .front-row,
    .back-row {
      display: grid;
      gap: 10px;
    }

    .front-row {
      grid-template-columns: 150px;
      justify-content: center;
    }

    .back-row {
      grid-template-columns: repeat(5, 86px);
      align-items: end;
      justify-content: start;
    }

    .slot {
      min-width: 0;
    }

    .back-row .slot {
      display: grid;
      gap: 5px;
    }

    .slot-name {
      min-height: 16px;
      color: var(--ink);
      font-size: 12px;
      font-weight: 850;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      letter-spacing: 0;
      text-shadow: 0 1px 0 rgba(255, 255, 255, .75);
    }

    .card {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 4.2;
      min-height: 112px;
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 0;
      overflow: hidden;
      background: #dfe7ef;
      color: white;
      box-shadow: 0 10px 22px rgba(17, 24, 39, .16);
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease, opacity .2s ease, filter .2s ease;
      animation: cardIn .22s ease both;
    }

    .front-row .card {
      min-height: 164px;
    }

    .back-row .card {
      min-height: 92px;
      box-shadow: 0 7px 16px rgba(17, 24, 39, .14);
    }

    .back-row .card::after {
      background: linear-gradient(180deg, transparent 58%, rgba(0, 0, 0, .62));
    }

    .back-row .hp-tube {
      height: 8px;
      margin-top: 4px;
      border-color: rgba(31, 41, 51, .14);
      background: #dbe4ee;
    }

    .back-row .card-info {
      left: 6px;
      right: 6px;
      bottom: 5px;
    }

    .back-row .name {
      display: none;
    }

    .back-row .hp-text {
      margin-top: 0;
      font-size: 10px;
      line-height: 1;
    }

    .back-row .hp-text span:first-child {
      display: none;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 30px rgba(17, 24, 39, .2);
    }

    .card.selected {
      border-color: #ffd166;
      box-shadow: 0 0 0 4px rgba(255, 209, 102, .34), 0 0 22px rgba(255, 209, 102, .32), 0 18px 30px rgba(17, 24, 39, .22);
    }

    .card.defeated {
      filter: grayscale(.9);
      opacity: .58;
    }

    .card.hit {
      animation: hurt .45s ease;
    }

    .card.heal {
      animation: heal .5s ease;
    }

    .card.placeholder {
      display: grid;
      place-items: center;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, .5), rgba(241, 245, 249, .28)),
        repeating-linear-gradient(135deg, rgba(100, 116, 139, .08) 0 1px, transparent 1px 8px);
      border: 1px solid rgba(148, 163, 184, .58);
      box-shadow: none;
      opacity: .86;
    }

    .card.placeholder:hover {
      border-color: rgba(47, 111, 237, .42);
      box-shadow: 0 0 0 4px rgba(47, 111, 237, .08);
    }

    .card.placeholder::after {
      display: none;
    }

    .slot-line {
      width: 58%;
      height: 2px;
      border-radius: 999px;
      background: rgba(100, 116, 139, .48);
      box-shadow:
        0 8px 0 rgba(100, 116, 139, .18),
        0 -8px 0 rgba(100, 116, 139, .12),
        18px 0 0 -1px rgba(100, 116, 139, .16),
        -18px 0 0 -1px rgba(100, 116, 139, .16);
    }

    .art {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 22%, rgba(255, 255, 255, .42), transparent 22%),
        linear-gradient(145deg, #2f6fed, #15a37d 52%, #b78118);
      background-size: cover;
      background-position: center;
    }

    .side.right .art {
      background:
        radial-gradient(circle at 50% 22%, rgba(255, 255, 255, .42), transparent 22%),
        linear-gradient(145deg, #dc3a3a, #7253d8 55%, #263238);
      background-size: cover;
      background-position: center;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 35%, rgba(0, 0, 0, .82));
      pointer-events: none;
    }

    .card-info {
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: 8px;
      z-index: 1;
      text-align: left;
    }

    .name {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 800;
      font-size: 14px;
      letter-spacing: 0;
    }

    .hp-text {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin-top: 5px;
      font-size: 12px;
      font-weight: 700;
    }

    .hp-tube {
      position: relative;
      display: block;
      height: 14px;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 7px;
      background: rgba(17, 24, 39, .5);
      border: 1px solid rgba(255, 255, 255, .3);
    }

    .hp-fill {
      position: relative;
      display: block;
      height: 100%;
      width: 100%;
      min-width: 0;
      border-radius: inherit;
      background: #e23232;
      transition: width .38s ease;
    }

    .hp-tube.large {
      height: 22px;
      margin-top: 10px;
      border-color: rgba(31, 41, 51, .16);
      background: #dbe4ee;
    }

    .float {
      position: absolute;
      inset-inline: 0;
      top: 20%;
      z-index: 3;
      margin: auto;
      width: max-content;
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(17, 24, 39, .82);
      color: white;
      font-size: 18px;
      font-weight: 900;
      opacity: 0;
      pointer-events: none;
      box-shadow: 0 8px 18px rgba(17, 24, 39, .28);
    }

    .float.show {
      animation: floatText .7s ease forwards;
    }

    .inspector {
      min-height: 100vh;
      border-left: 1px solid rgba(202, 213, 225, .9);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .92), rgba(248, 250, 252, .94)),
        #ffffff;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: -14px 0 28px rgba(17, 24, 39, .06);
    }

    .panel-title {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }

    .selected-mini {
      display: grid;
      grid-template-columns: 74px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      padding: 10px;
      border: 1px solid rgba(202, 213, 225, .95);
      border-radius: 8px;
      background: linear-gradient(180deg, #ffffff, #f8fafc);
      box-shadow: var(--soft-shadow);
    }

    .mini-art {
      width: 74px;
      aspect-ratio: 3 / 4.2;
      border-radius: 6px;
      background:
        radial-gradient(circle at 50% 22%, rgba(255, 255, 255, .42), transparent 22%),
        linear-gradient(145deg, #2f6fed, #15a37d 52%, #b78118);
      background-size: cover;
      background-position: center;
      box-shadow: 0 6px 14px rgba(17, 24, 39, .12);
    }

    .mini-art.empty-art {
      display: grid;
      place-items: center;
      border: 1px dashed rgba(100, 116, 139, .62);
      background: rgba(255, 255, 255, .42);
      box-shadow: none;
    }

    .mini-name {
      margin: 0;
      font-weight: 850;
      overflow-wrap: anywhere;
    }

    .mini-position {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 0 10px;
      background: #ffffff;
      color: var(--ink);
      outline: none;
      box-shadow: 0 1px 0 rgba(255, 255, 255, .9) inset;
    }

    input[type="text"]:focus,
    input[type="number"]:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(47, 111, 237, .12);
    }

    input[type="file"] {
      width: 100%;
      color: var(--muted);
    }

    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .hp-preview {
      padding: 10px;
      border: 1px solid rgba(202, 213, 225, .95);
      border-radius: 8px;
      background: linear-gradient(180deg, #ffffff, #f8fafc);
    }

    .hp-preview-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .card-search {
      display: grid;
      gap: 10px;
      padding: 10px;
      border: 1px solid rgba(202, 213, 225, .95);
      border-radius: 8px;
      background: linear-gradient(180deg, #ffffff, #f8fafc);
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 72px;
      gap: 8px;
    }

    .search-source {
      width: 100%;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 0 10px;
      background: white;
      color: var(--ink);
      box-shadow: 0 1px 0 rgba(255, 255, 255, .9) inset;
    }

    .search-results {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      max-height: 260px;
      overflow: auto;
    }

    .search-card {
      border: 1px solid rgba(202, 213, 225, .95);
      border-radius: 7px;
      background: linear-gradient(180deg, #ffffff, #f8fafc);
      padding: 6px;
      text-align: left;
      display: grid;
      gap: 6px;
      min-width: 0;
      transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    }

    .search-card:hover {
      border-color: #a9b8c8;
      transform: translateY(-2px);
      box-shadow: 0 10px 18px rgba(17, 24, 39, .1);
    }

    .search-card img {
      width: 100%;
      aspect-ratio: 3 / 4.2;
      object-fit: cover;
      border-radius: 5px;
      background: #e5eaf0;
      box-shadow: 0 5px 10px rgba(17, 24, 39, .08);
    }

    .search-card span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
      font-weight: 800;
    }

    .search-card small,
    .search-status {
      color: var(--muted);
      font-size: 12px;
    }

    .actions {
      display: grid;
      gap: 10px;
      padding: 12px 0 0;
      border-top: 1px solid rgba(202, 213, 225, .95);
    }

    .amount-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 86px;
      gap: 8px;
    }

    .quick-panel {
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid rgba(202, 213, 225, .95);
      border-radius: 8px;
      background: linear-gradient(180deg, #ffffff, #f8fafc);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
    }

    .toggle-row input {
      width: 18px;
      height: 18px;
      accent-color: var(--black);
      flex: 0 0 auto;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .log {
      min-height: 128px;
      max-height: 220px;
      overflow: auto;
      padding: 10px;
      border: 1px solid rgba(202, 213, 225, .95);
      border-radius: 8px;
      background: linear-gradient(180deg, #ffffff, #f8fafc);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .log p {
      margin: 0 0 8px;
      padding: 0 0 7px;
      border-bottom: 1px solid rgba(226, 232, 240, .78);
    }

    .log p:last-child {
      border-bottom: 0;
    }

    .empty {
      color: var(--muted);
      line-height: 1.55;
    }

    @keyframes hurt {
      0%, 100% { transform: translateX(0); }
      12% { transform: translateX(-8px) rotate(-1.2deg); }
      28% { transform: translateX(7px) rotate(1deg); }
      44% { transform: translateX(-5px) rotate(-.8deg); }
      60% { transform: translateX(3px); box-shadow: 0 0 0 999px rgba(220, 58, 58, .36) inset, 0 16px 28px rgba(17, 24, 39, .2); filter: saturate(1.25); }
    }

    @keyframes heal {
      0%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); box-shadow: 0 0 0 999px rgba(22, 134, 95, .22) inset, 0 16px 28px rgba(17, 24, 39, .2); }
    }

    @keyframes cardIn {
      0% { opacity: 0; transform: translateY(5px) scale(.98); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes floatText {
      0% { opacity: 0; transform: translateY(12px) scale(.9); }
      18% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-34px) scale(1.05); }
    }

    @media (max-width: 1100px) {
      .app {
        grid-template-columns: 1fr;
      }

      .inspector {
        min-height: auto;
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }

    @media (max-width: 820px) {
      .arena-wrap {
        padding: 16px;
      }

      .topbar,
      .battlefield {
        grid-template-columns: 1fr;
        display: grid;
      }

      .toolbar {
        justify-content: start;
      }

      .formation {
        grid-template-columns: 128px minmax(0, 1fr);
        gap: 10px;
      }

      .front-row {
        grid-template-columns: 128px;
      }

      .back-row {
        grid-template-columns: repeat(5, clamp(54px, 12vw, 74px));
        gap: 6px;
      }

      .card {
        min-height: 108px;
      }

      .name {
        font-size: 12px;
      }

      .hp-text {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="arena-wrap">
      <header class="topbar">
        <div>
          <h1>伤害模拟器</h1>
        </div>
        <div class="toolbar" aria-label="全局操作">
          <button class="btn" id="fullHealBtn" type="button">全员回满</button>
          <button class="btn" id="clearAllBtn" type="button">清空卡位</button>
          <button class="btn danger" id="resetBtn" type="button">重置卡组</button>
        </div>
      </header>

      <section class="battlefield" id="battlefield" aria-label="战场"></section>
    </section>

    <aside class="inspector" aria-label="卡片编辑">
      <h2 class="panel-title">卡片</h2>
      <div id="selectedPanel"></div>
      <div class="actions">
        <div class="quick-panel">
          <label class="toggle-row" for="quickModeInput">
            <span>快捷伤害</span>
            <input id="quickModeInput" type="checkbox">
          </label>
          <p class="hint">开启后点击卡面造成数值伤害，Shift + 点击治疗。</p>
        </div>
        <label for="amountInput">伤害 / 治疗数值</label>
        <div class="amount-row">
          <input id="amountInput" type="number" min="0" step="1" value="10">
          <button class="btn primary" id="damageBtn" type="button">造成伤害</button>
        </div>
        <button class="btn" id="healBtn" type="button">治疗</button>
      </div>
      <section>
        <h2 class="panel-title">记录</h2>
        <div class="log" id="log"></div>
      </section>
    </aside>
  </main>

  <script>
    const STORAGE_KEY = "simple-damage-simulator-v1";
    const teams = [
      { id: "left", name: "左方", className: "left" },
      { id: "right", name: "右方", className: "right" }
    ];
    const oldSetMap = {
      BS: "base1", JU: "base2", FO: "base3", TR: "base5", G1: "gym1", G2: "gym2",
      N1: "neo1", N2: "neo2", N3: "neo3", N4: "neo4", E1: "ecard1", E2: "ecard2", E3: "ecard3",
      RS: "ex1", SS: "ex2", DR: "ex3", MA: "ex4", HL: "ex5", RG: "ex6", TRR: "ex7", DX: "ex8",
      EM: "ex9", UF: "ex10", DS: "ex11", LM: "ex12", HP: "ex13", CG: "ex14", DF: "ex15", PK: "ex16",
      DP: "dp1", MT: "dp2", SW: "dp3", GE: "dp4", MD: "dp5", LA: "dp6", SF: "dp7", PL: "pl1",
      RR: "pl2", SV: "pl3", AR: "pl4", WP: "basep", NP: "np", DPP: "dpp", P1: "pop1", P2: "pop2",
      P3: "pop3", P4: "pop4", P5: "pop5", P6: "pop6", P7: "pop7", P8: "pop8", P9: "pop9",
      BS2: "base4", LC: "base6", SI: "si1", BG: "bp", RM: "ru1"
    };
    let limitlessSocket = null;
    let limitlessSocketReady = false;
    let limitlessPendingSearch = null;

    const defaultCards = [];
    teams.forEach((team) => {
      defaultCards.push({
        id: `${team.id}-front-1`,
        team: team.id,
        row: "front",
        pos: 1,
        name: team.id === "left" ? "前卫" : "敌方前卫",
        hp: 100,
        maxHp: 100,
        occupied: true,
        image: ""
      });
      for (let i = 1; i <= 5; i += 1) {
        defaultCards.push({
          id: `${team.id}-back-${i}`,
          team: team.id,
          row: "back",
          pos: i,
          name: team.id === "left" ? `后排 ${i}` : `敌方后排 ${i}`,
          hp: 80,
          maxHp: 80,
          occupied: true,
          image: ""
        });
      }
    });

    let state = loadState();
    let selectedId = state.selectedId || "left-front-1";

    const battlefield = document.getElementById("battlefield");
    const selectedPanel = document.getElementById("selectedPanel");
    const amountInput = document.getElementById("amountInput");
    const quickModeInput = document.getElementById("quickModeInput");
    const logEl = document.getElementById("log");
    amountInput.value = state.amount ?? 10;
    quickModeInput.checked = Boolean(state.quickMode);

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (saved && Array.isArray(saved.cards)) {
          return {
            cards: defaultCards.map((card) => {
              const savedCard = saved.cards.find((item) => item.id === card.id) || {};
              return { ...card, ...savedCard, occupied: savedCard.occupied ?? card.occupied };
            }),
            logs: Array.isArray(saved.logs) ? saved.logs.slice(0, 18) : [],
            selectedId: saved.selectedId,
            quickMode: Boolean(saved.quickMode),
            amount: saved.amount ?? 10
          };
        }
      } catch (error) {
        console.warn("读取存档失败", error);
      }
      return { cards: defaultCards.map((card) => ({ ...card })), logs: [], quickMode: false, amount: 10 };
    }

    function saveState() {
      state.quickMode = quickModeInput.checked;
      state.amount = Math.max(0, Math.floor(Number(amountInput.value) || 0));
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ ...state, selectedId }));
    }

    function getCard(id = selectedId) {
      return state.cards.find((card) => card.id === id);
    }

    function clampHp(card) {
      card.maxHp = Math.max(1, Number(card.maxHp) || 1);
      card.hp = Math.min(card.maxHp, Math.max(0, Number(card.hp) || 0));
    }

    function positionText(card) {
      return `${card.team === "left" ? "左方" : "右方"} · ${card.row === "front" ? "前排" : "后排"} ${card.pos}`;
    }

    function render() {
      battlefield.innerHTML = teams.map((team) => {
        const front = state.cards.filter((card) => card.team === team.id && card.row === "front");
        const back = state.cards.filter((card) => card.team === team.id && card.row === "back");
        return `
          <article class="side ${team.className}">
            <header class="side-header">
              <span class="side-mark" aria-hidden="true"></span>
              <h2 class="side-title">${team.name}</h2>
            </header>
            <div class="formation">
              <div>
                <p class="row-label">前排</p>
                <div class="front-row">${front.map(cardTemplate).join("")}</div>
              </div>
              <div>
                <p class="row-label">后排</p>
                <div class="back-row">${back.map(cardTemplate).join("")}</div>
              </div>
            </div>
          </article>
        `;
      }).join("");

      renderInspector();
      renderLog();
      saveState();
    }

    function cardTemplate(card) {
      if (!card.occupied) {
        return `
          <div class="slot ${card.row === "back" ? "back-slot" : "front-slot"}">
            <button class="card placeholder ${card.id === selectedId ? "selected" : ""}" data-id="${card.id}" type="button" aria-label="空卡位 ${positionText(card)}">
              <span class="slot-line" aria-hidden="true"></span>
            </button>
          </div>
        `;
      }
      const ratio = Math.max(0, Math.min(1, card.hp / card.maxHp));
      const artStyle = card.image ? `style="background-image:url('${card.image.replaceAll("'", "%27")}')"` : "";
      if (card.row === "back") {
        return `
          <div class="slot back-slot">
            <div class="slot-name" title="${escapeAttr(card.name)}">${escapeHtml(card.name)}</div>
            <button class="card ${card.id === selectedId ? "selected" : ""} ${card.hp <= 0 ? "defeated" : ""}" data-id="${card.id}" type="button" aria-label="${card.name}">
              <span class="art" ${artStyle}></span>
              <span class="float" data-float="${card.id}"></span>
              <span class="card-info">
                <span class="name">${escapeHtml(card.name)}</span>
                <span class="hp-text"><span>HP</span><span>${card.hp}/${card.maxHp}</span></span>
                <span class="hp-tube">
                  <span class="hp-fill" style="width:${ratio * 100}%"></span>
                </span>
              </span>
            </button>
          </div>
        `;
      }
      return `
        <div class="slot front-slot">
          <button class="card ${card.id === selectedId ? "selected" : ""} ${card.hp <= 0 ? "defeated" : ""}" data-id="${card.id}" type="button" aria-label="${card.name}">
            <span class="art" ${artStyle}></span>
            <span class="float" data-float="${card.id}"></span>
            <span class="card-info">
              <span class="name">${escapeHtml(card.name)}</span>
              <span class="hp-text"><span>HP</span><span>${card.hp} / ${card.maxHp}</span></span>
              <span class="hp-tube">
                <span class="hp-fill" style="width:${ratio * 100}%"></span>
              </span>
            </span>
          </button>
        </div>
      `;
    }

    function searchPanelTemplate(title) {
      return `
        <div class="card-search">
          <label for="cardSearchInput">${title}</label>
          <select class="search-source" id="cardSearchSource">
            <option value="cryst">Cryst 简中卡库</option>
            <option value="limitless">Limitless 英文卡库</option>
          </select>
          <div class="search-row">
            <input id="cardSearchInput" type="text" placeholder="例如 皮卡丘 / Pikachu">
            <button class="btn" id="cardSearchBtn" type="button">搜索</button>
          </div>
          <div class="search-status" id="cardSearchStatus">来源：Cryst 简中卡库</div>
          <div class="search-results" id="cardSearchResults"></div>
        </div>
      `;
    }

    function attachSearchHandlers(card) {
      const input = document.getElementById("cardSearchInput");
      const source = document.getElementById("cardSearchSource");
      const button = document.getElementById("cardSearchBtn");
      if (!input || !button) return;
      const runSearch = () => {
        const query = input.value.trim();
        if (!query) return;
        searchCards(query, card, source.value);
      };
      button.addEventListener("click", runSearch);
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") runSearch();
      });
      source.addEventListener("change", () => {
        const status = document.getElementById("cardSearchStatus");
        const results = document.getElementById("cardSearchResults");
        if (status) status.textContent = source.value === "cryst" ? "来源：Cryst 简中卡库" : "来源：Limitless TCG Cards";
        if (results) results.innerHTML = "";
        input.placeholder = source.value === "cryst" ? "例如 皮卡丘 / 喷火龙" : "例如 Pikachu / Charizard";
      });
    }

    function searchCards(query, card, source) {
      if (source === "cryst") {
        searchCrystCards(query, card);
        return;
      }
      searchLimitlessCards(query, card);
    }

    function searchLimitlessCards(query, card) {
      const status = document.getElementById("cardSearchStatus");
      const results = document.getElementById("cardSearchResults");
      if (!status || !results) return;
      status.textContent = "正在搜索...";
      results.innerHTML = "";
      limitlessPendingSearch = { query, cardId: card.id };
      ensureLimitlessSocket((data) => {
        if (!limitlessPendingSearch || limitlessPendingSearch.query !== query || limitlessPendingSearch.cardId !== card.id) return;
        const cards = Array.isArray(data.cards) ? data.cards.slice(0, 18) : [];
        if (!cards.length) {
          status.textContent = "没有找到结果";
          return;
        }
        status.textContent = `找到 ${cards.length} 张，点击即可应用`;
        results.innerHTML = cards.map((item, index) => {
          const image = cardImageUrl(item, "sm");
          return `
            <button class="search-card" type="button" data-index="${index}">
              <img src="${image}" alt="${escapeAttr(item.name)}" loading="lazy">
              <span>${escapeHtml(item.name)}</span>
              <small>${escapeHtml(item.set)} ${escapeHtml(item.number)}</small>
            </button>
          `;
        }).join("");
        results.querySelectorAll(".search-card").forEach((button) => {
          button.addEventListener("click", () => {
            const item = cards[Number(button.dataset.index)];
            applyLimitlessCard(card, item);
          });
        });
      }, () => {
        status.textContent = "搜索连接失败，可以稍后再试";
      });
    }

    async function searchCrystCards(query, card) {
      const status = document.getElementById("cardSearchStatus");
      const results = document.getElementById("cardSearchResults");
      if (!status || !results) return;
      status.textContent = "正在搜索简中卡库...";
      results.innerHTML = "";
      try {
        const response = await fetch("https://tcg.mik.moe/api/v3/card/card-basic-search", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ searchText: query, exact: false, unique: false, page: 1, pageSize: 18 })
        });
        const payload = await response.json();
        const cards = Array.isArray(payload?.data?.list) ? payload.data.list : [];
        if (!cards.length) {
          status.textContent = "没有找到简中结果";
          return;
        }
        status.textContent = `找到 ${cards.length} 张，点击即可应用`;
        results.innerHTML = cards.map((item, index) => {
          const image = crystImageUrl(item);
          return `
            <button class="search-card" type="button" data-index="${index}">
              <img src="${image}" alt="${escapeAttr(item.cardName)}" loading="lazy">
              <span>${escapeHtml(item.cardName)}</span>
              <small>${escapeHtml(item.setCode)} ${escapeHtml(item.cardIndex)} ${escapeHtml(item.rarity || "")}</small>
            </button>
          `;
        }).join("");
        results.querySelectorAll(".search-card").forEach((button) => {
          button.addEventListener("click", () => {
            const item = cards[Number(button.dataset.index)];
            applyCrystCard(card, item);
          });
        });
      } catch (error) {
        status.textContent = "简中卡库连接失败，可以稍后再试";
        console.error(error);
      }
    }

    function ensureLimitlessSocket(onMessage, onError) {
      if (!limitlessSocket || limitlessSocket.readyState === WebSocket.CLOSED || limitlessSocket.readyState === WebSocket.CLOSING) {
        limitlessSocketReady = false;
        limitlessSocket = new WebSocket("wss://mew.limitlesstcg.com", "search");
        limitlessSocket.addEventListener("open", () => {
          limitlessSocketReady = true;
          sendLimitlessSearch();
        });
        limitlessSocket.addEventListener("message", (event) => {
          try {
            onMessage(JSON.parse(event.data));
          } catch (error) {
            onError(error);
          }
        });
        limitlessSocket.addEventListener("error", onError);
      } else {
        limitlessSocket.onmessage = (event) => {
          try {
            onMessage(JSON.parse(event.data));
          } catch (error) {
            onError(error);
          }
        };
      }
      if (limitlessSocketReady) sendLimitlessSearch();
    }

    function sendLimitlessSearch() {
      if (!limitlessSocketReady || !limitlessPendingSearch) return;
      limitlessSocket.send(JSON.stringify({ category: "cards", input: limitlessPendingSearch.query, lang: "en" }));
    }

    async function applyLimitlessCard(card, item) {
      card.occupied = true;
      card.name = item.name || card.name;
      card.image = cardImageUrl(item);
      const hp = await fetchLimitlessHp(item);
      applyDetectedHp(card, hp);
      clampHp(card);
      addLog(`${card.name} 使用了 Limitless 卡面`);
      render();
    }

    async function applyCrystCard(card, item) {
      card.occupied = true;
      card.name = item.cardName || card.name;
      card.image = crystImageUrl(item);
      const hp = await fetchCrystHp(item);
      applyDetectedHp(card, hp);
      clampHp(card);
      addLog(`${card.name} 使用了简中卡面`);
      render();
    }

    function applyDetectedHp(card, hp) {
      const value = Math.max(0, Math.floor(Number(hp) || 0));
      if (!value) return;
      card.maxHp = value;
      card.hp = value;
    }

    async function fetchCrystHp(item) {
      try {
        const response = await fetch("https://tcg.mik.moe/api/v3/card/card-detail", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ setCode: item.setCode, cardIndex: item.cardIndex })
        });
        const payload = await response.json();
        return payload?.data?.pokemonAttr?.hp;
      } catch (error) {
        console.error(error);
        return 0;
      }
    }

    async function fetchLimitlessHp(item) {
      try {
        const url = new URL(`https://limitlesstcg.com/api/cards/${item.set}/${item.number}`);
        if (item.translation) {
          url.searchParams.set("translate", "en");
        } else {
          url.searchParams.set("lang", item.language || "en");
        }
        const response = await fetch(url);
        const payload = await response.json();
        return payload?.hp;
      } catch (error) {
        console.error(error);
        return 0;
      }
    }

    function crystImageUrl(item) {
      return `https://tcg.mik.moe/static/img/${item.setCode}/${item.cardIndex}.png`;
    }

    function cardImageUrl(item, size = null) {
      if (isOldInternationalSet(item)) return oldCardImageUrl(item, size);
      const isInternational = item.language !== "jp" && !item.translation;
      const owner = isInternational ? "tpci" : "tpc";
      const lang = isInternational ? item.language : "JP";
      const number = isInternational ? String(item.number).replace(/^(\d{1,2})(a|b)?$/, (_, digits, suffix) => `${digits.padStart(3, "0")}${suffix || ""}`) : item.number;
      const suffix = `R_${lang}${size ? `_${size}` : ""}`.toUpperCase();
      return `https://limitlesstcg.nyc3.cdn.digitaloceanspaces.com/${owner}/${item.set}/${item.set}_${number}_${suffix}.png`;
    }

    function isOldInternationalSet(item) {
      return (item.region || (item.language === "jp" || item.translation ? "tpc" : "int")) === "int" && item.set in oldSetMap;
    }

    function oldCardImageUrl(item, size) {
      let number = item.number;
      if (item.set === "DPP") number = `DP${String(number).padStart(2, "0")}`;
      if (number === "?") number = "question";
      if (size !== "xs" && size !== "sm") number += "_hires";
      return `https://images.pokemontcg.io/${oldSetMap[item.set]}/${number}.png`;
    }

    function renderInspector() {
      const card = getCard();
      if (!card) {
        selectedPanel.innerHTML = `<p class="empty">选择一张卡片后即可编辑。</p>`;
        updateActionButtons();
        return;
      }
      if (!card.occupied) {
        selectedPanel.innerHTML = `
          <div class="selected-mini">
            <div class="mini-art empty-art"><span class="slot-line" aria-hidden="true"></span></div>
            <div>
              <p class="mini-name">空卡位</p>
              <p class="mini-position">${positionText(card)}</p>
            </div>
          </div>
          ${searchPanelTemplate("搜索并放置卡面")}
          <button class="btn primary" id="placeCardBtn" type="button">放置卡片</button>
        `;
        attachSearchHandlers(card);
        document.getElementById("placeCardBtn").addEventListener("click", () => {
          card.occupied = true;
          clampHp(card);
          addLog(`${positionText(card)} 放置了卡片`);
          render();
        });
        updateActionButtons();
        return;
      }
      const miniStyle = card.image ? `style="background-image:url('${card.image.replaceAll("'", "%27")}')"` : "";
      selectedPanel.innerHTML = `
        <div class="selected-mini">
          <div class="mini-art" ${miniStyle}></div>
          <div>
            <p class="mini-name" id="selectedMiniName">${escapeHtml(card.name)}</p>
            <p class="mini-position" id="selectedMiniPosition">${positionText(card)}</p>
          </div>
        </div>
        <div class="field">
          <label for="nameInput">名字</label>
          <input id="nameInput" type="text" value="${escapeAttr(card.name)}" maxlength="18">
        </div>
        <div class="split">
          <div class="field">
            <label for="hpInput">当前血量</label>
            <input id="hpInput" type="number" min="0" step="1" value="${card.hp}">
          </div>
          <div class="field">
            <label for="maxHpInput">最大血量</label>
            <input id="maxHpInput" type="number" min="1" step="1" value="${card.maxHp}">
          </div>
        </div>
        <div class="hp-preview">
          <div class="hp-preview-top">
            <span>血量展示</span>
            <span id="selectedHpText">${card.hp} / ${card.maxHp}</span>
          </div>
          <div class="hp-tube large">
            <span class="hp-fill" id="selectedHpFill" style="width:${Math.max(0, Math.min(1, card.hp / card.maxHp)) * 100}%"></span>
          </div>
        </div>
        <div class="field">
          <label for="imageInput">替换卡面</label>
          <input id="imageInput" type="file" accept="image/*">
        </div>
        ${searchPanelTemplate("搜索卡面")}
        <button class="btn" id="clearImageBtn" type="button">清除卡面</button>
        <button class="btn danger" id="removeCardBtn" type="button">移除卡片</button>
      `;
      attachSearchHandlers(card);

      document.getElementById("nameInput").addEventListener("input", (event) => {
        card.name = event.target.value.trim() || "未命名";
        refreshCardVisual(card);
        refreshInspectorSummary(card);
        saveState();
      });
      document.getElementById("hpInput").addEventListener("input", (event) => {
        if (event.target.value === "") return;
        card.hp = Number(event.target.value);
        clampHp(card);
        event.target.value = card.hp;
        refreshCardVisual(card);
        refreshInspectorSummary(card);
        saveState();
      });
      document.getElementById("maxHpInput").addEventListener("input", (event) => {
        if (event.target.value === "") return;
        card.maxHp = Number(event.target.value);
        clampHp(card);
        event.target.value = card.maxHp;
        const hpInput = document.getElementById("hpInput");
        if (hpInput) hpInput.value = card.hp;
        refreshCardVisual(card);
        refreshInspectorSummary(card);
        saveState();
      });
      document.getElementById("imageInput").addEventListener("change", (event) => {
        const file = event.target.files && event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          card.image = reader.result;
          addLog(`${card.name} 更换了卡面`);
          render();
        };
        reader.readAsDataURL(file);
      });
      document.getElementById("clearImageBtn").addEventListener("click", () => {
        card.image = "";
        addLog(`${card.name} 清除了卡面`);
        render();
      });
      document.getElementById("removeCardBtn").addEventListener("click", () => {
        card.occupied = false;
        addLog(`${card.name} 已从 ${positionText(card)} 移除`);
        render();
      });
      updateActionButtons();
    }

    function renderLog() {
      logEl.innerHTML = state.logs.length
        ? state.logs.map((item) => `<p>${escapeHtml(item)}</p>`).join("")
        : `<p>暂无记录</p>`;
    }

    function addLog(text) {
      state.logs.unshift(text);
      state.logs = state.logs.slice(0, 18);
      saveState();
    }

    function refreshCardVisual(card) {
      const cardEl = document.querySelector(`.card[data-id="${card.id}"]`);
      if (!cardEl) return;
      const ratio = Math.max(0, Math.min(1, card.hp / card.maxHp));
      const slotEl = cardEl.closest(".slot");
      cardEl.setAttribute("aria-label", card.name);
      cardEl.classList.toggle("defeated", card.hp <= 0);
      const nameEl = slotEl.querySelector(".slot-name") || cardEl.querySelector(".name");
      const hpEl = cardEl.querySelector(".hp-text span:last-child");
      const barEl = cardEl.querySelector(".hp-fill");
      if (nameEl) nameEl.textContent = card.name;
      if (hpEl) hpEl.textContent = `${card.hp} / ${card.maxHp}`;
      if (barEl) barEl.style.width = `${ratio * 100}%`;
    }

    function refreshInspectorSummary(card) {
      const miniName = document.getElementById("selectedMiniName");
      const miniPosition = document.getElementById("selectedMiniPosition");
      const selectedHpText = document.getElementById("selectedHpText");
      const selectedHpFill = document.getElementById("selectedHpFill");
      const ratio = Math.max(0, Math.min(1, card.hp / card.maxHp));
      if (miniName) miniName.textContent = card.name;
      if (miniPosition) miniPosition.textContent = positionText(card);
      if (selectedHpText) selectedHpText.textContent = `${card.hp} / ${card.maxHp}`;
      if (selectedHpFill) selectedHpFill.style.width = `${ratio * 100}%`;
    }

    function updateActionButtons() {
      const card = getCard();
      const disabled = !card || !card.occupied;
      document.getElementById("damageBtn").disabled = disabled;
      document.getElementById("healBtn").disabled = disabled;
      amountInput.disabled = disabled;
    }

    function animateCard(cardId, text, type) {
      const cardEl = document.querySelector(`.card[data-id="${cardId}"]`);
      if (!cardEl) return;
      const floatEl = cardEl.querySelector(".float");
      cardEl.classList.remove("hit", "heal");
      void cardEl.offsetWidth;
      cardEl.classList.add(type);
      floatEl.textContent = text;
      floatEl.classList.remove("show");
      void floatEl.offsetWidth;
      floatEl.classList.add("show");
    }

    function getActionAmount() {
      return Math.max(0, Math.floor(Number(amountInput.value) || 0));
    }

    function applyToCard(card, mode, amount) {
      if (!card || !card.occupied || amount <= 0) return;
      const before = card.hp;
      if (mode === "damage") {
        card.hp = Math.max(0, card.hp - amount);
        const delta = before - card.hp;
        addLog(`${card.name} 受到 ${delta} 点伤害`);
        render();
        animateCard(card.id, `-${delta}`, "hit");
      } else {
        card.hp = Math.min(card.maxHp, card.hp + amount);
        const delta = card.hp - before;
        addLog(`${card.name} 回复 ${delta} 点血量`);
        render();
        animateCard(card.id, `+${delta}`, "heal");
      }
    }

    function applyAmount(mode) {
      const card = getCard();
      if (!card || !card.occupied) return;
      applyToCard(card, mode, getActionAmount());
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("\n", " ");
    }

    battlefield.addEventListener("click", (event) => {
      const cardEl = event.target.closest(".card");
      if (!cardEl) return;
      selectedId = cardEl.dataset.id;
      const card = getCard();
      const shouldQuickApply = quickModeInput.checked && card && card.occupied && !event.altKey;
      if (shouldQuickApply) {
        applyToCard(card, event.shiftKey ? "heal" : "damage", getActionAmount());
      } else {
        render();
      }
    });

    document.getElementById("damageBtn").addEventListener("click", () => applyAmount("damage"));
    document.getElementById("healBtn").addEventListener("click", () => applyAmount("heal"));
    amountInput.addEventListener("input", saveState);
    quickModeInput.addEventListener("change", saveState);
    document.getElementById("fullHealBtn").addEventListener("click", () => {
      state.cards.forEach((card) => {
        if (card.occupied) card.hp = card.maxHp;
      });
      addLog("全员回满");
      render();
    });
    document.getElementById("clearAllBtn").addEventListener("click", () => {
      state.cards.forEach((card) => {
        card.occupied = false;
      });
      addLog("已清空所有卡位");
      render();
    });
    document.getElementById("resetBtn").addEventListener("click", () => {
      state = { cards: defaultCards.map((card) => ({ ...card })), logs: ["已重置卡组"] };
      selectedId = "left-front-1";
      render();
    });

    render();
  </script>
</body>
</html>
